<html lang="pt-BR"><head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1a23",

<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-slate-200/50 via-transparent to-primary/5 dark:from-slate-800/50 dark:to-primary/20"></div>
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] rounded-full bg-primary/10 blur-[100px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[500px] h-[500px] rounded-full bg-blue-300/20 blur-[80px] dark:bg-blue-900/20"></div>
</div>
<div class="relative z-10 w-full max-w-[480px] p-4">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 dark:border-slate-800 overflow-hidden backdrop-blur-sm">
<div class="px-8 pt-10 pb-6 flex flex-col items-center text-center">
<div class="flex items-center gap-3 text-primary dark:text-white mb-6">
<div class="size-8 text-primary dark:text-sky-400">

</div>
<h2 class="text-slate-900 dark:text-white text-2xl font-bold leading-tight tracking-[-0.015em]">Fluxo+</h2>
</div>
<h1 class="text-slate-900 dark:text-white text-xl font-semibold mb-2">Bem-vindo de volta</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Insira seus dados para acessar sua conta.</p>
</div>
<div class="px-8 pb-10">
<form class="flex flex-col gap-5">
<label class="flex flex-col gap-1.5">
<span class="text-slate-900 dark:text-slate-200 text-sm font-medium">E-mail</span>
<div class="relative">
<input class="form-input w-full rounded-lg border-slate-200 bg-slate-50 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder:text-slate-500 h-11 px-4 transition-colors" placeholder="nome@empresa.com" type="email"/>
</div>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-slate-900 dark:text-slate-200 text-sm font-medium">Senha</span>
<div class="relative">
<input class="form-input w-full rounded-lg border-slate-200 bg-slate-50 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder:text-slate-500 h-11 px-4 transition-colors" placeholder="••••••••" type="password"/>
</div>
</label>
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors" href="#">
                        Esqueci minha senha
                    </a>
</div>
<button class="flex w-full cursor-pointer items-center justify-center rounded-lg h-11 px-4 bg-primary hover:bg-blue-900 text-white text-sm font-bold leading-normal tracking-[0.015em] transition-colors shadow-sm mt-2">
<span class="truncate">Entrar</span>
</button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 dark:text-slate-500 text-xs font-medium uppercase">Ou continue com</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:hover:bg-slate-700 h-10 transition-colors" type="button">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-[20px]">g_mobiledata</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-700 dark:hover:bg-slate-700 h-10 transition-colors" type="button">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-[20px]">dataset</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">SSO</span>
</button>
</div>
<p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4">
                    Não tem uma conta?
                    <a class="font-medium text-primary hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300" href="#">Fale com vendas</a>
</p>
</form>
</div>
</div>
<div class="mt-8 flex justify-between items-center text-slate-500 dark:text-slate-400 text-xs px-2 w-full max-w-[480px]">
<div class="flex gap-4">
<a class="hover:text-slate-800 dark:hover:text-slate-200 transition-colors" href="#">Privacidade</a>
<a class="hover:text-slate-800 dark:hover:text-slate-200 transition-colors" href="#">Termos</a>
</div>
<div class="flex items-center gap-1 cursor-pointer hover:text-slate-800 dark:hover:text-slate-200 transition-colors group">
<span class="material-symbols-outlined text-[16px]">language</span>
<span>Português (BR)</span>
<span class="material-symbols-outlined text-[16px] group-hover:rotate-180 transition-transform">expand_more</span>
</div>
</div>
</div>
